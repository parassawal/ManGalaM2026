<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManGalaM 2026 - Racing Registration</title>
    <meta name="description" content="Register your RC Car for the ManGalaM 2026 Racing Event.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="background-animation">
        <div class="blob blob-1" style="background: radial-gradient(circle, rgba(220,38,38,0.15) 0%, rgba(220,38,38,0) 70%);"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="form-header">
            <div class="badge">ManGalaM 2026</div>
            <h1 class="glitch-text" data-text="CAR Racing">CAR Racing</h1>
            <p class="subtitle">Secure your grid slot on the track.</p>
        </header>

        <!-- Form Card -->
        <div class="form-card glass-panel">
            <form id="sharkTankForm" novalidate>
                <input type="hidden" id="eventName" value="CAR Racing">
                
                <!-- Section 1: Team Leader Details -->
                <section class="form-section active" id="section-1">
                    <div class="section-header">
                        <i data-lucide="crown" class="section-icon"></i>
                        <h2>Driver / Crew Chief Details</h2>
                        <p>Contact information</p>
                    </div>
                    
                    <div class="input-field full-width">
                        <input type="text" id="leaderName" required placeholder=" ">
                        <label for="leaderName">Full Name</label>
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-group">
                        <div class="input-field">
                            <input type="email" id="leaderEmail" required placeholder=" ">
                            <label for="leaderEmail">Email Address</label>
                            <span class="focus-border"></span>
                        </div>
                        <div class="input-field">
                            <input type="tel" id="leaderPhone" required placeholder=" ">
                            <label for="leaderPhone">Contact Number</label>
                            <span class="focus-border"></span>
                        </div>
                    </div>
                </section>

                <!-- Section 2: Vehicle Info -->
                <section class="form-section collapsed" id="section-2">
                    <div class="section-header">
                        <i data-lucide="wrench" class="section-icon"></i>
                        <h2>Garage Details</h2>
                        <p>Team and Vehicle specification details</p>
                    </div>
                    
                    <div class="input-field full-width">
                        <input type="text" id="teamName" required placeholder=" ">
                        <label for="teamName">Team / Garage Name</label>
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-field full-width">
                        <input type="text" id="vehicleName" required placeholder=" ">
                        <label for="vehicleName">RC Car Designation / Nickname</label>
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-field select-wrapper full-width">
                        <select id="vehicleType" required style="padding-top: 1.5rem; height: auto; min-height: 3.5rem;">
                            <option value="" disabled selected>Select Circuit Type</option>
                            <option value="Wired">Wired Track</option>
                            <option value="Wireless">Wireless / Remote Control</option>
                        </select>
                        <i data-lucide="chevron-down" class="select-icon"></i>
                        <label for="vehicleType" class="select-label">Vehicle Category</label>
                        <span class="focus-border"></span>
                    </div>
                </section>

                <!-- Section 3: Declaration -->
                <section class="form-section declaration-section collapsed" id="section-3">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="declaration" required>
                        <span class="checkmark">
                            <i data-lucide="check" class="check-icon"></i>
                        </span>
                        <span class="checkbox-text">I confirm our RC Car adheres to the safety and size guidelines provided by the tech committee.</span>
                    </label>
                </section>

                <!-- Form Controls -->
                <div class="form-actions">
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="formProgress"></div>
                    </div>
                    <p class="progress-text"><span id="completedSections">1</span>/3 Sections Completed</p>
                    
                    <button type="submit" class="submit-btn disabled" id="submitBtn">
                        <span class="btn-text">Rev Up & Submit</span>
                        <i data-lucide="send" class="btn-icon"></i>
                        <div class="btn-glow"></div>
                    </button>
                </div>
            </form>
            
            <!-- Success State -->
            <div id="successState" class="success-state hidden">
                <div class="success-icon-container">
                    <i data-lucide="check-circle" class="success-icon-large"></i>
                </div>
                <h2>Locked In!</h2>
                <p>Grid position secure. Tune your motor and we'll see you on the asphalt.</p>
                <button class="outline-btn" onclick="window.location.reload()">Register Another Car</button>
            </div>
            
        </div>
    </div>

    <!-- Hidden bypasses -->
    <input type="file" id="prototypeImages" hidden>

    <script src="script.js"></script>
</body>
</html>
