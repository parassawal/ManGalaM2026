<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManGalaM 2026 - IoT Arena Registration</title>
    <meta name="description" content="Register your project for the IoT Arena.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="background-animation">
        <div class="blob blob-1" style="background: radial-gradient(circle, rgba(14,165,233,0.15) 0%, rgba(14,165,233,0) 70%);"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="form-header">
            <div class="badge">ManGalaM 2026</div>
            <h1 class="glitch-text" data-text="IoT Arena">IoT Arena</h1>
            <p class="subtitle">Register your hardware & software project.</p>
        </header>

        <!-- Form Card -->
        <div class="form-card glass-panel">
            <form id="sharkTankForm" novalidate>
                <input type="hidden" id="eventName" value="IoT Arena">
                
                <!-- Section 1: Team Leader Details -->
                <section class="form-section active" id="section-1">
                    <div class="section-header">
                        <i data-lucide="crown" class="section-icon"></i>
                        <h2>Team Leader Details</h2>
                        <p>Contact information</p>
                    </div>
                    
                    <div class="input-field full-width">
                        <input type="text" id="leaderName" required placeholder=" ">
                        <label for="leaderName">Leader Full Name</label>
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-group">
                        <div class="input-field">
                            <input type="email" id="leaderEmail" required placeholder=" ">
                            <label for="leaderEmail">Email Address</label>
                            <span class="focus-border"></span>
                        </div>
                        <div class="input-field">
                            <input type="tel" id="leaderPhone" required placeholder=" ">
                            <label for="leaderPhone">Contact Number</label>
                            <span class="focus-border"></span>
                        </div>
                    </div>
                </section>

                <!-- Section 2: Project Info -->
                <section class="form-section collapsed" id="section-2">
                    <div class="section-header">
                        <i data-lucide="cpu" class="section-icon"></i>
                        <h2>Project Configuration</h2>
                        <p>Details about your prototype</p>
                    </div>
                    
                    <div class="input-field full-width">
                        <input type="text" id="teamName" required placeholder=" ">
                        <label for="teamName">Team / Project Name</label>
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-field full-width">
                        <textarea id="projectIdea" rows="2" required placeholder=" "></textarea>
                        <label for="projectIdea">Briefly describe your IoT prototype</label>
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-field full-width">
                        <input type="text" id="hardwareStack" required placeholder=" ">
                        <label for="hardwareStack">Primary Hardware Used (e.g., ESP32, Arduino Uno)</label>
                        <span class="focus-border"></span>
                    </div>
                </section>

                <!-- Section 3: Declaration -->
                <section class="form-section declaration-section collapsed" id="section-3">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="declaration" required>
                        <span class="checkmark">
                            <i data-lucide="check" class="check-icon"></i>
                        </span>
                        <span class="checkbox-text">I confirm that our prototype will be ready for live demonstration during the fest event.</span>
                    </label>
                </section>

                <!-- Form Controls -->
                <div class="form-actions">
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="formProgress"></div>
                    </div>
                    <p class="progress-text"><span id="completedSections">1</span>/3 Sections Completed</p>
                    
                    <button type="submit" class="submit-btn disabled" id="submitBtn">
                        <span class="btn-text">Submit Registration</span>
                        <i data-lucide="send" class="btn-icon"></i>
                        <div class="btn-glow"></div>
                    </button>
                </div>
            </form>
            
            <!-- Success State -->
            <div id="successState" class="success-state hidden">
                <div class="success-icon-container">
                    <i data-lucide="check-circle" class="success-icon-large"></i>
                </div>
                <h2>Registration Set!</h2>
                <p>Prepare your sensors and circuits. We'll see you in the Arena!</p>
                <button class="outline-btn" onclick="window.location.reload()">Register Another Team</button>
            </div>
            
        </div>
    </div>

    <!-- Hidden bypasses -->
    <input type="file" id="prototypeImages" hidden>

    <script src="script.js"></script>
</body>
</html>
