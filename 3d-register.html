<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManGalaM 2026 - 3D Model Registration</title>
    <meta name="description" content="Register your project for the 3D Model Event.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="background-animation">
        <div class="blob blob-1" style="background: radial-gradient(circle, rgba(236,72,153,0.15) 0%, rgba(236,72,153,0) 70%);"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="form-header">
            <div class="badge">ManGalaM 2026</div>
            <h1 class="glitch-text" data-text="3D Model">3D Model</h1>
            <p class="subtitle">Secure your slot to present your 3D creations.</p>
        </header>

        <!-- Form Card -->
        <div class="form-card glass-panel">
            <form id="sharkTankForm" novalidate>
                <input type="hidden" id="eventName" value="3D Model">
                
                <!-- Section 1: Team Leader Details -->
یہ                 <section class="form-section active" id="section-1">
                    <div class="section-header">
                        <i data-lucide="crown" class="section-icon"></i>
                        <h2>Lead Artist Details</h2>
                        <p>Contact information for the main presenter</p>
                    </div>
                    
                    <div class="input-field full-width">
                        <input type="text" id="leaderName" required placeholder=" ">
                        <label for="leaderName">Full Name</label>
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-group">
                        <div class="input-field">
                            <input type="email" id="leaderEmail" required placeholder=" ">
                            <label for="leaderEmail">Email Address</label>
                            <span class="focus-border"></span>
                        </div>
                        <div class="input-field">
                            <input type="tel" id="leaderPhone" required placeholder=" ">
                            <label for="leaderPhone">Contact Number</label>
                            <span class="focus-border"></span>
                        </div>
                    </div>
                </section>

                <!-- Section 2: Model Info -->
                <section class="form-section collapsed" id="section-2">
                    <div class="section-header">
                        <i data-lucide="box" class="section-icon"></i>
                        <h2 id="teamLabel">Model Details</h2>
                        <p>A brief overview of your 3D submission</p>
                    </div>
                    
                    <div class="input-field full-width">
                        <input type="text" id="projectName" required placeholder=" ">
                        <label for="projectName">Title of the 3D Masterpiece</label>
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-field select-wrapper full-width">
                        <select id="softwareUsed" required style="padding-top: 1.5rem; height: auto; min-height: 3.5rem;">
                            <option value="" disabled selected>Primary Software Used</option>
                            <option value="Blender">Blender</option>
                            <option value="Autodesk Maya">Autodesk Maya</option>
                            <option value="3ds Max">3ds Max</option>
                            <option value="SolidWorks">SolidWorks</option>
                            <option value="Fusion 360">Fusion 360</option>
                            <option value="ZBrush">ZBrush</option>
                            <option value="Cinema 4D">Cinema 4D</option>
                            <option value="Other">Other</option>
                        </select>
                        <i data-lucide="chevron-down" class="select-icon"></i>
                        <label for="softwareUsed" class="select-label">Software Selection</label>
                        <span class="focus-border"></span>
                    </div>

                    <div class="input-field full-width">
                        <textarea id="projectIdea" rows="2" required placeholder=" "></textarea>
                        <label for="projectIdea">What is the concept behind the model?</label>
                        <span class="focus-border"></span>
                    </div>
                </section>

                <!-- Section 3: Declaration -->
                <section class="form-section declaration-section collapsed" id="section-3">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="declaration" required>
                        <span class="checkmark">
                            <i data-lucide="check" class="check-icon"></i>
                        </span>
                        <span class="checkbox-text">I confirm this 3D model is originally created by me/my team and is not a downloaded asset from the internet.</span>
                    </label>
                </section>

                <!-- Form Controls -->
                <div class="form-actions">
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="formProgress"></div>
                    </div>
                    <p class="progress-text"><span id="completedSections">1</span>/3 Sections Completed</p>
                    
                    <button type="submit" class="submit-btn disabled" id="submitBtn">
                        <span class="btn-text">Proceed & Submit</span>
                        <i data-lucide="send" class="btn-icon"></i>
                        <div class="btn-glow"></div>
                    </button>
                </div>
            </form>
            
            <!-- Success State -->
            <div id="successState" class="success-state hidden">
                <div class="success-icon-container">
                    <i data-lucide="check-circle" class="success-icon-large"></i>
                </div>
                <h2>Registration Complete!</h2>
                <p>We can't wait to see your digital creations in person.</p>
                <button class="outline-btn" onclick="window.location.reload()">Register Another Model</button>
            </div>
            
        </div>
    </div>

    <!-- Hidden bypasses -->
    <input type="file" id="prototypeImages" hidden>

    <script src="script.js"></script>
</body>
</html>
